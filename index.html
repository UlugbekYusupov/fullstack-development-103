<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up and Login Forms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-wrapper">
        <div class="register-container">
            <h2 id="title">Sign Up</h2>
            <form>
                <input type="text" class="input-field" id="username" placeholder="Username">
                <input type="email" class="input-field" placeholder="Email">
                <input type="password" class="input-field" placeholder="Password">
                <button type="submit" class="btn-submit">Submit</button>
            </form>
            <p class="form-link" id="loginBtn">Already have an account? Login</p>
        </div>

                <button type="button" class="btn-outline" id="registerBtn">Don't have an account? Sign Up</button>
            </form>
        </div> -->

    <script src="app.js"></script>
</body>
</html>
